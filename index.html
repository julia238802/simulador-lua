<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador das Fases da Lua 3D</title>
    <style>
        body { 
            margin: 0; 
            background: #000; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            overflow: hidden;
        }

        #tela-inicio {
            position: fixed; inset: 0; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle, #111 0%, #000 100%);
            text-align: center;
        }

        #simulador { 
            display: none; 
            width: 100vw; 
            height: 100vh; 
        }

        .painel { 
            flex: 1; 
            position: relative; 
            border-right: 1px solid #333; 
        }

        .legenda { 
            position: absolute; 
            top: 20px; 
            width: 100%; 
            text-align: center; 
            z-index: 10; 
            color: #eee;
            text-shadow: 2px 2px 4px #000;
        }

        #nome-fase { 
            top: 60px; 
            font-size: 1.8rem; 
            font-weight: bold;
            color: #ffcc00; 
        }

        #controles { 
            position: absolute; 
            bottom: 40px; 
            left: 50%; 
            transform: translateX(-50%); 
            z-index: 100; 
        }

        button {
            padding: 15px 30px; 
            cursor: pointer; 
            font-weight: bold; 
            border-radius: 30px; 
            border: none;
            background: #fff;
            transition: transform 0.2s, background 0.2s;
        }

        button:hover { 
            transform: scale(1.1); 
            background: #ffcc00;
        }
    </style>
</head>
<body>

<div id="tela-inicio">
    <h1>Simulador das Fases da Lua</h1>
    <p>Clique abaixo para iniciar a visualização 3D realista</p>
    <button id="btn-entrar">Começar Simulação</button>
</div>

<div id="simulador">
    <div class="painel" id="lado-esquerdo">
        <div class="legenda">VISÃO DA ÓRBITA</div>
    </div>
    <div class="painel" id="lado-direito">
        <div class="legenda">VISÃO DA TERRA</div>
        <div class="legenda" id="nome-fase">Lua Nova</div>
    </div>
    
    <div id="controles">
        <button id="btn-proximo">Próxima Fase ➔</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    let faseIdx = 0;
    const fases = [
        { nome: "Lua Nova", angulo: 0 },
        { nome: "Crescente", angulo: Math.PI / 4 },
        { nome: "Quarto Crescente", angulo: Math.PI / 2 },
        { nome: "Gibosa Crescente", angulo: (3 * Math.PI) / 4 },
        { nome: "Lua Cheia", angulo: Math.PI },
        { nome: "Gibosa Minguante", angulo: (5 * Math.PI) / 4 },
        { nome: "Quarto Minguante", angulo: (3 * Math.PI) / 2 },
        { nome: "Lua Minguante", angulo: (7 * Math.PI) / 4 }
    ];

    let cenaEsq, cameraEsq, rendererEsq, terra, luaEsq;
    let cenaDir, cameraDir, rendererDir, luaDir, luzDir;

    const loader = new THREE.TextureLoader();
    // ESSENCIAL para as imagens aparecerem no GitHub:
    loader.setCrossOrigin('anonymous'); 

    const texTerra = "https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_atmos_2048.jpg";
    const texLua = "https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/moon_1024.jpg";

    document.getElementById('btn-entrar').onclick = () => {
        document.getElementById('tela-inicio').style.display = 'none';
        document.getElementById('simulador').style.display = 'flex';
        setup();
    };

    function setup() {
        const w = window.innerWidth / 2;
        const h = window.innerHeight;
        const pr = window.devicePixelRatio;

        // --- LADO ESQUERDO ---
        cenaEsq = new THREE.Scene();
        cameraEsq = new THREE.PerspectiveCamera(35, w / h, 0.1, 1000);
        rendererEsq = new THREE.WebGLRenderer({ antialias: true });
        rendererEsq.setSize(w, h);
        rendererEsq.setPixelRatio(pr);
        document.getElementById('lado-esquerdo').appendChild(rendererEsq.domElement);

        const luzSolEsq = new THREE.DirectionalLight(0xffffff, 1.5);
        luzSolEsq.position.set(20, 0, 0); 
        cenaEsq.add(luzSolEsq);
        cenaEsq.add(new THREE.AmbientLight(0x222222));

        const tTerra = loader.load(texTerra);
        tTerra.anisotropy = 16;
        terra = new THREE.Mesh(new THREE.SphereGeometry(1, 64, 64), new THREE.MeshPhongMaterial({ map: tTerra }));
        cenaEsq.add(terra);

        const tLua = loader.load(texLua);
        tLua.anisotropy = 16;
        luaEsq = new THREE.Mesh(new THREE.SphereGeometry(0.25, 64, 64), new THREE.MeshPhongMaterial({ map: tLua }));
        cenaEsq.add(luaEsq);

        cameraEsq.position.set(0, 12, 0); 
        cameraEsq.lookAt(0,0,0);

        // --- LADO DIREITO ---
        cenaDir = new THREE.Scene();
        cameraDir = new THREE.PerspectiveCamera(45, w / h, 0.1, 1000);
        rendererDir = new THREE.WebGLRenderer({ antialias: true });
        rendererDir.setSize(w, h);
        rendererDir.setPixelRatio(pr);
        document.getElementById('lado-direito').appendChild(rendererDir.domElement);

        luzDir = new THREE.DirectionalLight(0xffffff, 2.2);
        cenaDir.add(luzDir);
        cenaDir.add(new THREE.AmbientLight(0x151515));

        luaDir = new THREE.Mesh(new THREE.SphereGeometry(1.2, 128, 128), new THREE.MeshPhongMaterial({ map: tLua }));
        cenaDir.add(luaDir);
        cameraDir.position.z = 5; 

        atualizar();
        loop();
    }

    function atualizar() {
        const fase = fases[faseIdx];
        document.getElementById('nome-fase').innerText = fase.nome;

        // LADO ESQUERDO
        luaEsq.position.x = Math.cos(fase.angulo) * 3.5;
        luaEsq.position.z = -Math.sin(fase.angulo) * 3.5;

        // LADO DIREITO
        luzDir.position.x = -Math.sin(fase.angulo) * 10;
        luzDir.position.z = -Math.cos(fase.angulo) * 10;
    }

    document.getElementById('btn-proximo').onclick = () => {
        faseIdx = (faseIdx + 1) % fases.length;
        atualizar();
    };

    function loop() {
        requestAnimationFrame(loop);
        if(terra) terra.rotation.y += 0.002;
        if(rendererEsq) rendererEsq.render(cenaEsq, cameraEsq);
        if(rendererDir) rendererDir.render(cenaDir, cameraDir);
    }
</script>
</body>
</html>
